<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 CDN 资源预览测试 - 交大毕业照购物车</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .subtitle { opacity: 0.8; font-size: 14px; }
        .cdn-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
        }
        .section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .video-card:hover { transform: scale(1.02); }
        .video-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }
        .video-card-info {
            padding: 12px;
            font-size: 13px;
        }
        .video-card-info .name { font-weight: 600; margin-bottom: 5px; }
        .video-card-info .url {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            opacity: 0.6;
            word-break: break-all;
            margin-top: 8px;
        }
        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        .status-loading { background: #f39c12; }
        .status-success { background: #27ae60; }
        .status-error { background: #e74c3c; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .image-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .image-card:hover { transform: scale(1.05); }
        .image-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background: #222;
            display: block;
        }
        .image-card-info {
            padding: 8px;
            font-size: 11px;
            text-align: center;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: transparent;
            color: #1e3c72;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ffed4e, #ffa500);
        }

        .note {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 CDN 资源预览测试</h1>
            <div class="subtitle">验证 Cloudflare R2 上的视频和图片是否正常加载</div>
            <div class="cdn-info" id="cdn-url">正在获取 CDN 地址...</div>
        </header>

        <div class="note">
            <strong>📋 使用说明：</strong><br>
            1. 下面的视频和图片都是直接从 Cloudflare R2 CDN 加载的<br>
            2. 如果能看到视频播放和图片显示，说明 R2 配置正确 ✅<br>
            3. 如果显示红色错误图标，说明文件未上传到 R2 或路径不对 ❌<br>
            4. 测试通过后，点击底部按钮回到主页开始使用
        </div>

        <div class="section">
            <div class="section-title">
                🎥 封面视频测试
                <span class="status status-loading" id="video-status">检测中...</span>
            </div>
            <div class="video-grid" id="video-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">
                📸 地标图片测试
                <span class="status status-loading" id="landmark-status">检测中...</span>
            </div>
            <div class="image-grid" id="landmark-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">
                👑 经典照片复刻
                <span class="status status-loading" id="classic-status">检测中...</span>
            </div>
            <div class="image-grid" id="classic-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">
                👩 单人姿势示意图
                <span class="status status-loading" id="solo-status">检测中...</span>
            </div>
            <div class="image-grid" id="solo-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">
                👥 团体姿势示意图
                <span class="status status-loading" id="group-status">检测中...</span>
            </div>
            <div class="image-grid" id="group-grid"></div>
        </div>

        <div class="nav-buttons">
            <a href="index.html" class="btn btn-primary">🚀 进入主页面</a>
            <a href="?use_cdn=0" class="btn">🔄 切换到本地模式</a>
        </div>
    </div>

    <script src="js/assets-config.js"></script>
    <script>
        // 显示 CDN 地址
        document.getElementById('cdn-url').textContent =
            'CDN 地址: ' + window.AssetConfig.CDN_BASE_URL +
            '  |  CDN 模式: ' + (window.AssetConfig.shouldUseCDN() ? '✅ 已启用' : '❌ 本地模式');

        // 渲染视频卡片
        function renderVideos() {
            const videos = [
                { name: '思源湖', path: 'assets/images/cover/siyuan_lake.mp4' },
                { name: '庙门', path: 'assets/images/cover/temple_gate.mp4' },
                { name: '凯旋门', path: 'assets/images/cover/triumphal_arch.mp4' }
            ];
            const grid = document.getElementById('video-grid');
            let loaded = 0, total = videos.length, failed = 0;

            videos.forEach((v, idx) => {
                const url = window.AssetConfig.resolvePath(v.path);
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video controls muted loop playsinline preload="metadata">
                        <source src="${url}" type="video/mp4">
                    </video>
                    <div class="video-card-info">
                        <div class="name">${v.name}</div>
                        <div class="url">${url}</div>
                    </div>
                `;
                const video = card.querySelector('video');
                video.addEventListener('loadeddata', () => {
                    loaded++;
                    checkStatus('video-status', loaded, failed, total);
                });
                video.addEventListener('error', () => {
                    failed++;
                    video.style.opacity = '0.3';
                    video.poster = '';
                    const info = card.querySelector('.video-card-info');
                    info.innerHTML = '<div class="name" style="color:#ff6b6b;">❌ 加载失败</div><div class="url">' + url + '</div>';
                    checkStatus('video-status', loaded, failed, total);
                });
                grid.appendChild(card);
            });
        }

        // 渲染图片卡片
        function renderImages(config, containerId, statusId) {
            const grid = document.getElementById(containerId);
            let loaded = 0, total = config.length, failed = 0;

            config.forEach(item => {
                const url = window.AssetConfig.resolvePath(item.path);
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${url}" alt="${item.name}" onerror="this.style.opacity='0.1'">
                    <div class="image-card-info">${item.name}</div>
                `;
                const img = card.querySelector('img');
                img.addEventListener('load', () => {
                    loaded++;
                    checkStatus(statusId, loaded, failed, total);
                });
                img.addEventListener('error', () => {
                    failed++;
                    const info = card.querySelector('.image-card-info');
                    info.innerHTML = '❌ ' + item.name;
                    checkStatus(statusId, loaded, failed, total);
                });
                grid.appendChild(card);
            });
        }

        function checkStatus(id, loaded, failed, total) {
            const el = document.getElementById(id);
            if (failed > 0) {
                el.textContent = `❌ ${failed}/${total} 个加载失败`;
                el.className = 'status status-error';
            } else if (loaded + failed === total) {
                el.textContent = `✅ 全部 ${total} 个加载成功`;
                el.className = 'status status-success';
            } else {
                el.textContent = `加载中... ${loaded + failed}/${total}`;
            }
        }

        // 初始化
        renderVideos();

        const landmarks = [
            { name: '思源湖', path: 'assets/images/landmarks/siyuan_lake.png' },
            { name: '庙门', path: 'assets/images/landmarks/temple_gate.png' },
            { name: '凯旋门', path: 'assets/images/landmarks/triumphal_arch.png' },
            { name: '中院走廊', path: 'assets/images/landmarks/zhongyuan_corridor.png' },
            { name: '饮水思源碑', path: 'assets/images/landmarks/yinshui_siyuan_stele.png' },
            { name: '蔷薇园', path: 'assets/images/landmarks/rose_garden.jpg' },
            { name: '植物园', path: 'assets/images/landmarks/botanical_garden.jpg' },
            { name: '百岁雄鹰', path: 'assets/images/landmarks/centennial_eagle.jpg' },
            { name: '主图楼梯', path: 'assets/images/landmarks/main_library_stairs.jpg' },
            { name: '电院草坪', path: 'assets/images/landmarks/dianyuan_lawn.jpg' }
        ];
        renderImages(landmarks, 'landmark-grid', 'landmark-status');

        const classicPhotos = [
            { name: '甄嬛传', path: 'assets/images/poses/classic_photos/classic_1_empresses.png' },
            { name: '吴京谢楠', path: 'assets/images/poses/classic_photos/classic_2_wujing_xienan.png' },
            { name: '回头的诱惑', path: 'assets/images/poses/classic_photos/classic_3_look_back.png' },
            { name: 'EXO', path: 'assets/images/poses/classic_photos/classic_3_exo.png' },
            { name: '特朗普', path: 'assets/images/poses/classic_photos/classic_4_trump.png' },
            { name: '甄嬛传(4人)', path: 'assets/images/poses/classic_photos/classic_4_empresses.png' },
            { name: '专业团队', path: 'assets/images/poses/classic_photos/classic_7_pro_team.png' }
        ];
        renderImages(classicPhotos, 'classic-grid', 'classic-status');

        const soloPoses = [
            { name: '坐姿歪头', path: 'assets/images/poses/solo_female/solo_female_sit_head_tilt.png' },
            { name: '顶书', path: 'assets/images/poses/solo_female/solo_female_sit_book_head.png' },
            { name: '指天', path: 'assets/images/poses/solo_female/solo_female_stand_point_up.png' },
            { name: '抛帽', path: 'assets/images/poses/solo_female/solo_female_stand_throw_cap.png' },
            { name: '抱书', path: 'assets/images/poses/solo_female/solo_female_stand_hold_book.png' },
            { name: '抱胸', path: 'assets/images/poses/solo_female/solo_female_stand_cross_arms.png' },
            { name: '指脑袋', path: 'assets/images/poses/solo_female/solo_female_stand_point_head.png' },
            { name: '挥手', path: 'assets/images/poses/solo_female/solo_female_stand_wave.png' },
            { name: '晕倒', path: 'assets/images/poses/solo_female/solo_female_stand_faint.png' },
            { name: '靠扶手', path: 'assets/images/poses/solo_female/solo_female_stand_lean_rail.png' },
            { name: '蹲姿点赞', path: 'assets/images/poses/solo_female/solo_female_squat_thumbs_up.png' }
        ];
        renderImages(soloPoses, 'solo-grid', 'solo-status');

        const groupPoses = [
            { name: '叠罗汉', path: 'assets/images/poses/group_mixed/group_6_stand_pyramid.png' },
            { name: '楼梯间', path: 'assets/images/poses/group_mixed/group_6_staircase.png' },
            { name: '操场奔跑', path: 'assets/images/poses/group_mixed/group_6_run_field.png' },
            { name: '扳手腕', path: 'assets/images/poses/group_mixed/group_6_arm_wrestle.png' },
            { name: '抬头看天', path: 'assets/images/poses/group_mixed/group_4_stand_look_up.png' },
            { name: '低头比耶', path: 'assets/images/poses/group_mixed/group_4_stand_look_down_peace.png' },
            { name: '走廊奔跑', path: 'assets/images/poses/group_mixed/group_4_stand_corridor_run.png' },
            { name: '坐姿合照', path: 'assets/images/poses/group_mixed/group_4_sit_photo.png' },
            { name: '坐姿比耶', path: 'assets/images/poses/group_mixed/group_4_sit_peace.png' },
            { name: '躺姿遮眼', path: 'assets/images/poses/group_mixed/group_4_lie_cover_eyes.png' }
        ];
        renderImages(groupPoses, 'group-grid', 'group-status');
    </script>
</body>
</html>
