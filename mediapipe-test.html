<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe 骨骼检测测试</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- MediaPipe Tasks Vision - 骨骼检测核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #0a0a14; color: white; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
        .test-container { max-width: 900px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .status-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .status-item { padding: 8px 12px; border-radius: 8px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-item.ok { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .status-item.fail { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .status-item.wait { background: rgba(241,196,15,0.15); color: #f1c40f; }
        .test-btn { padding: 12px 24px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 50px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin: 5px; }
        .test-btn:hover { opacity: 0.9; }
        .test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .camera-view { width: 100%; max-width: 640px; margin: 20px auto; position: relative; border-radius: 16px; overflow: hidden; background: #000; }
        #test-video { width: 100%; display: block; transform: scaleX(-1); }
        #test-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scaleX(-1); pointer-events: none; width: 100%; height: auto; }
        #match-display { text-align: center; font-size: 16px; padding: 12px; background: rgba(0,0,0,0.6); position: absolute; top: 12px; left: 50%; transform: translateX(-50%); border-radius: 50px; }
        .color-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
        .color-item { padding: 6px 12px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎯 MediaPipe 骨骼检测系统测试</h1>
        <p style="opacity: 0.7; margin-bottom: 20px;">测试环境: 多人检测 · 多色骨架 · 姿势匹配引导</p>

        <div class="status-panel" id="status-panel">
            <div class="status-item wait" id="status-lib">
                <span>📦 MediaPipe 库加载</span>
                <span>检测中...</span>
            </div>
            <div class="status-item wait" id="status-init">
                <span>⚙️ 初始化检测模型</span>
                <span>等待中...</span>
            </div>
            <div class="status-item wait" id="status-camera">
                <span>📷 摄像头访问</span>
                <span>未启动</span>
            </div>
            <div class="status-item wait" id="status-detect">
                <span>🎯 实时骨骼检测</span>
                <span>未启动</span>
            </div>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="test-btn" id="btn-start">▶️ 启动摄像头测试</button>
            <button class="test-btn" id="btn-stop" disabled>⏹️ 停止</button>
        </div>

        <div class="camera-view" style="display:none;" id="camera-view">
            <div id="match-display">准备中...</div>
            <video id="test-video" autoplay playsinline></video>
            <canvas id="test-canvas"></canvas>
        </div>

        <div class="color-legend" id="color-legend" style="display:none;">
            <div class="color-item" style="background: rgba(0, 160, 255, 0.2); color: #5dade2;">🟦 第1人骨骼</div>
            <div class="color-item" style="background: rgba(255, 100, 255, 0.2); color: #d66dd; color: #e056e0;">🟪 第2人骨骼</div>
            <div class="color-item" style="background: rgba(100, 255, 200, 0.2); color: #7dcea0;">🟩 第3人骨骼</div>
            <div class="color-item" style="background: rgba(255, 220, 100, 0.2); color: #f4d03f;">🟨 第4人骨骼</div>
        </div>

        <div class="status-panel" style="margin-top: 30px;">
            <h3 style="margin: 0 0 12px 0; font-size: 16px;">📋 功能说明</h3>
            <ul style="padding-left: 20px; line-height: 1.8; opacity: 0.85;">
                <li>✅ <strong>多人检测</strong>：自动识别画面中的多个人物骨架</li>
                <li>🎨 <strong>颜色区分</strong>：每个人物使用不同颜色的骨架和轮廓框</li>
                <li>📐 <strong>完整骨骼</strong>：显示 33 个关键点 + 完整连接</li>
                <li>👥 <strong>轮廓框</strong>：每个人物都有带编号的检测框</li>
                <li>🎯 <strong>姿势引导</strong>：与参考姿势匹配时显示匹配度</li>
            </ul>
        </div>
    </div>

    <script>
        // === 状态更新函数
        function updateStatus(id, type, text) {
            const el = document.getElementById(id);
            if (!el) { return; }
            el.className = 'status-item ' + type;
            el.innerHTML = el.innerHTML.replace(/<span>[^<]*<\/span>\s*$/, '<span>' + text + '</span>');
            // 更安全的方法 - 直接替换两个 span
            const spans = el.querySelectorAll('span');
            if (spans.length >= 2) {
                spans[1].textContent = text;
            }
        }

        // === 检查 MediaPipe 库检测 ===
        let poseLandmarker = null;
        let cameraStream = null;
        let animationFrame = null;
        let currentPose = { skeleton: 'classic_1_empresses' };

        // 模拟参考骨架数据 (0号人物)
        const refKeypoints = (function() {
            const pts = {};
            for (let i = 0; i < 33; i++) {
                pts[i] = { x: 0.5, y: 0.5, visibility: 1 };
            }
            // 简单站姿
            pts[0] = { x: 0.50, y: 0.18, visibility: 1 };
            pts[11] = { x: 0.42, y: 0.35, visibility: 1 };
            pts[12] = { x: 0.58, y: 0.35, visibility: 1 };
            pts[13] = { x: 0.35, y: 0.45, visibility: 1 };
            pts[14] = { x: 0.65, y: 0.45, visibility: 1 };
            pts[15] = { x: 0.30, y: 0.55, visibility: 1 };
            pts[16] = { x: 0.70, y: 0.55, visibility: 1 };
            pts[23] = { x: 0.44, y: 0.62, visibility: 1 };
            pts[24] = { x: 0.56, y: 0.62, visibility: 1 };
            pts[25] = { x: 0.42, y: 0.72, visibility: 1 };
            pts[26] = { x: 0.58, y: 0.72, visibility: 1 };
            pts[27] = { x: 0.42, y: 0.85, visibility: 1 };
            pts[28] = { x: 0.58, y: 0.85, visibility: 1 };
            return pts;
        })();

        const SKELETON_CONNECTIONS = [
            [0, 11], [0, 12], [11, 12], [11, 13], [13, 15], [15, 17],
            [15, 19], [15, 21], [17, 19], [12, 14], [14, 16], [16, 18],
            [16, 20], [16, 22], [18, 20], [11, 23], [12, 24], [23, 24],
            [23, 25], [25, 27], [27, 29], [27, 31], [24, 26], [26, 28],
            [28, 30], [28, 32]
        ];

        const userColors = [
            { stroke: 'rgba(0, 160, 255, 0.95)', joint: 'rgba(100, 200, 255, 1)', box: 'rgba(0, 160, 255, 0.85)' },
            { stroke: 'rgba(255, 100, 255, 0.95)', joint: 'rgba(255, 150, 255, 1)', box: 'rgba(255, 100, 255, 0.85)' },
            { stroke: 'rgba(100, 255, 200, 0.95)', joint: 'rgba(150, 255, 220, 1)', box: 'rgba(100, 255, 200, 0.85)' },
            { stroke: 'rgba(255, 220, 100, 0.95)', joint: 'rgba(255, 235, 150, 1)', box: 'rgba(255, 220, 100, 0.85)' }
        ];

        // === 检测库加载状态
        window.addEventListener('load', function() {
            if (window.PoseLandmarker && window.FilesetResolver) {
                updateStatus('status-lib', 'ok', '✅ 已加载');
            } else {
                setTimeout(function() {
                    if (window.PoseLandmarker && window.FilesetResolver) {
                        updateStatus('status-lib', 'ok', '✅ 已加载');
                    } else {
                        updateStatus('status-lib', 'fail', '❌ 加载失败 (请检查网络)');
                    }
                }, 2000);
            }
        });

        // === 启动摄像头 ===
        async function startCamera() {
            const video = document.getElementById('test-video');
            const canvas = document.getElementById('test-canvas');
            const matchDisplay = document.getElementById('match-display');

            updateStatus('status-camera', 'wait', '请求中...');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'user' }, width: { ideal: 1280 }, height: { ideal: 720 }
                });
                video.srcObject = cameraStream;
                await video.play();

                updateStatus('status-camera', 'ok', '✅ 已连接');
                document.getElementById('camera-view').style.display = 'block';
                document.getElementById('color-legend').style.display = 'flex';

                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;

                // === 初始化 MediaPipe 模型
                updateStatus('status-init', 'wait', '加载模型...');

                const vision = await window.FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
                );

                poseLandmarker = await window.PoseLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    numPoses: 4,
                    minPoseDetectionConfidence: 0.5,
                    minPosePresenceConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                updateStatus('status-init', 'ok', '✅ 模型已就绪');
                updateStatus('status-detect', 'ok', '✅ 实时检测中');

                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-stop').disabled = false;

                runDetectionLoop(video, canvas, matchDisplay);

            } catch (err) {
                console.error(err);
                updateStatus('status-camera', 'fail', '❌ 失败: ' + err.message);
            }
        }

        // === 实时检测循环 ===
        function runDetectionLoop(video, canvas, matchDisplay) {
            const ctx = canvas.getContext('2d');

            function detectFrame(now) {
                if (!cameraStream) return;

                let result = poseLandmarker.detectForVideo(video, now);

                // 更新 canvas 尺寸
                if (video.videoWidth !== canvas.width || video.videoHeight !== canvas.height) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 绘制参考骨架 (虚线)
                drawRefSkeleton(ctx, canvas.width, canvas.height);

                if (result.landmarks && result.landmarks.length > 0) {
                    // 绘制检测到的每个人物
                    result.landmarks.forEach((landmarks, idx) => {
                        drawUserSkeleton(ctx, landmarks, canvas.width, canvas.height, idx);
                    });

                    // 计算匹配度
                    const matchScore = calcMatchScore(result.landmarks[0]);
                    let matchText = '';
                    if (matchScore < 0.15) { matchText = '✅ 完美匹配 (' + Math.round((1 - matchScore / 0.15) + '%)'; }
                    else if (matchScore < 0.25) { matchText = '🟡 接近匹配 (' + Math.round((1 - (matchScore - 0.15) / 0.1 * 50 + 50) + '%)'; }
                    else if (matchScore < 0.4) { matchText = '🎯 匹配中 (' + Math.round((1 - (matchScore - 0.25) / 0.15 * 30 + 20) + '%)'; }
                    else { matchText = '📐 请对齐骨架'; }
                    matchDisplay.textContent = matchText;
                    matchDisplay.style.background = matchScore < 0.15 ? 'rgba(46,204,113,0.85)' : (matchScore < 0.25 ? 'rgba(251,196,18,0.85)' : 'rgba(0,0,0,0.7)';
                } else {
                    matchDisplay.textContent = '👀 未检测到人物';
                    matchDisplay.style.background = 'rgba(0,0,0,0.7)';
                }

                animationFrame = requestAnimationFrame(detectFrame);
            }
            animationFrame = requestAnimationFrame(detectFrame);
        }

        function drawRefSkeleton(ctx, w, h) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 6]);
            SKELETON_CONNECTIONS.forEach(([from, to]) => {
                const p1 = refKeypoints[from];
                const p2 = refKeypoints[to];
                if (p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                    ctx.stroke();
                }
            });
            ctx.setLineDash([]);
            // 关节点
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            const major = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
            major.forEach(i => {
                const pt = refKeypoints[i];
                if (pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x * w, pt.y * h, 6, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });
        }

        function drawUserSkeleton(ctx, landmarks, w, h, idx) {
            const colors = userColors[idx % userColors.length];
            // 人物编号
            let minX = 1, maxX = 0, minY = 1, maxY = 0;
            landmarks.forEach(lm => {
                if (lm.x < minX) minX = lm.x;
                if (lm.x > maxX) maxX = lm.x;
                if (lm.y < minY) minY = lm.y;
                if (lm.y > maxY) maxY = lm.y;
            });

            // 人物轮廓框
            ctx.strokeStyle = colors.box;
            ctx.lineWidth = 3;
            ctx.strokeRect(minX * w, minY * h, (maxX - minX) * w, (maxY - minY) * h);
            ctx.fillStyle = colors.stroke;
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('人物 ' + (idx + 1), minX * w + 4, minY * h + 16);

            // 骨架连接线
            ctx.strokeStyle = colors.stroke;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            SKELETON_CONNECTIONS.forEach(([from, to]) => {
                const p1 = landmarks[from];
                const p2 = landmarks[to];
                if (p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                    ctx.stroke();
                }
            });

            // 关节点
            landmarks.forEach((pt, i) => {
                const isMajor = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28].includes(i);
                const r = isMajor ? 6 : 3;
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, r + 2, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, r, 0, 2 * Math.PI);
                ctx.fillStyle = colors.joint;
                ctx.fill();
            });
        }

        function calcMatchScore(landmarks) {
            if (!landmarks) return 1;
            const majorJoints = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
            let totalDist = 0, count = 0;
            majorJoints.forEach(i => {
                const ref = refKeypoints[i];
                const user = landmarks[i];
                if (ref && user && user.visibility > 0.3) {
                    const dx = ref.x - user.x;
                    const dy = ref.y - user.y;
                    totalDist += Math.sqrt(dx * dx + dy * dy);
                    count++;
                }
            });
            return count > 0 ? totalDist / count : 1;
        }

        // === 停止 ===
        function stopCamera() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('camera-view').style.display = 'none';
            document.getElementById('color-legend').style.display = 'none';
            updateStatus('status-camera', 'wait', '已停止');
            updateStatus('status-detect', 'wait', '已停止');
        }

        document.getElementById('btn-start').addEventListener('click', startCamera);
        document.getElementById('btn-stop').addEventListener('click', stopCamera);
    </script>
</body>
</html>
