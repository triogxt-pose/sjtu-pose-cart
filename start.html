<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交大毕业照购物车 - 启动页</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 700px;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
            text-align: left;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
            transform: translateY(-3px);
        }
        .btn-emoji { font-size: 32px; margin-bottom: 8px; }
        .btn-title { margin-bottom: 5px; }
        .btn-desc { font-size: 12px; opacity: 0.7; font-weight: normal; }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #1e3c72;
            grid-column: span 2;
            text-align: center;
            padding: 25px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ffed4e, #ffa500);
        }
        .btn-primary .btn-title { font-size: 20px; margin-bottom: 8px; }
        .btn-primary .btn-desc { font-size: 14px; opacity: 0.8; }

        .info {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            font-size: 13px;
            line-height: 1.8;
            text-align: left;
            backdrop-filter: blur(10px);
        }
        .info strong { color: #ffd700; }
        .info ul { margin: 10px 0 0 20px; }
        .info li { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎓📸</div>
        <h1>交大毕业照购物车</h1>
        <p class="subtitle">
            一键复刻经典电影海报造型<br>
            AI 智能推荐 · 姿势引导 · 路线规划
        </p>

        <div class="btn-grid">
            <a href="index.html" class="btn btn-primary">
                <div class="btn-emoji">🚀</div>
                <div class="btn-title">开始使用</div>
                <div class="btn-desc">进入主应用 - 开始选择你的毕业照方案</div>
            </a>

            <a href="mirror-photo.html" class="btn" style="background: linear-gradient(135deg, rgba(255,100,255,0.2), rgba(0,168,255,0.2)); border-color: rgba(0,168,255,0.4);">
                <div class="btn-emoji">🪞</div>
                <div class="btn-title">镜面拍照工具</div>
                <div class="btn-desc">实时姿势对比 · AI 辅助拍照（推荐）</div>
            </a>

            <a href="preview-cdn.html" class="btn">
                <div class="btn-emoji">🎬</div>
                <div class="btn-title">资源测试</div>
                <div class="btn-desc">检查 CDN 资源是否正常加载</div>
            </a>

            <a href="index.html?use_cdn=0" class="btn">
                <div class="btn-emoji">🔧</div>
                <div class="btn-title">本地模式</div>
                <div class="btn-desc">使用本地资源（需本地有文件）</div>
            </a>
        </div>

        <div class="info">
            <strong>✨ 功能一览</strong>
            <ul>
                <li>📍 10+ 个交大地标拍照点位推荐</li>
                <li>🎬 经典电影海报姿势复刻（甄嬛传、EXO、吴京谢楠...）</li>
                <li>📱 实时骨骼姿势引导（MediaPipe AI 辅助）</li>
                <li>🛒 购物车模式收藏喜欢的拍摄方案</li>
                <li>🤖 AI 聊天助手帮你定制拍摄路线</li>
            </ul>
        </div>
    </div>
</body>
</html>
