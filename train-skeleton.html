<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>骨架训练工具 - MediaPipe Hands + Face</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
        }
        h1 { color: #00a8ff; font-size: 24px; margin: 0 0 20px 0; }
        h2 { color: #e0e0e0; font-size: 18px; margin: 20px 0 10px 0; border-left: 3px solid #00a8ff; padding-left: 10px; }
        .controls { background: #1a1a2e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .controls button {
            padding: 10px 20px;
            margin-right: 10px;
            background: #00a8ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .controls button:disabled { background: #444; cursor: not-allowed; }
        .controls button.danger { background: #ff6b6b; }
        .controls button.success { background: #4caf50; }
        .controls span { margin-left: 15px; color: #aaa; }
        .image-container {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .image-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
        }
        .image-card {
            background: #0a0a14;
            border: 2px solid #2a2a4e;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .image-card.active { border-color: #00a8ff; box-shadow: 0 0 15px rgba(0,168,255,0.4); }
        .image-card.done { border-color: #4caf50; }
        .image-card canvas, .image-card img {
            max-width: 200px;
            max-height: 200px;
            display: block;
        }
        .image-card .label { text-align: center; margin-top: 8px; font-size: 12px; color: #aaa; }
        .preview-area {
            background: #0a0a14;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .preview-area canvas {
            max-width: 100%;
            max-height: 500px;
            border: 2px solid #2a2a4e;
            border-radius: 4px;
            background: #000;
        }
        .status-log {
            background: #0a0a14;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: "Courier New", monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #2a2a4e;
        }
        .log-line { margin: 3px 0; }
        .log-info { color: #00a8ff; }
        .log-success { color: #4caf50; }
        .log-warn { color: #ff9800; }
        .log-error { color: #ff6b6b; }
        .export-area {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #0a0a14;
            color: #e0e0e0;
            border: 1px solid #2a2a4e;
            border-radius: 4px;
            padding: 10px;
            font-family: "Courier New", monospace;
            font-size: 12px;
            resize: vertical;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>🎯 MediaPipe 骨架训练工具 (Pose + Hands + Face)</h1>

    <div class="controls">
        <button id="btn-init" onclick="initModels()">1️⃣ 初始化模型</button>
        <button id="btn-detect" onclick="detectAll()" disabled>2️⃣ 批量检测7张图</button>
        <button id="btn-export" onclick="exportData()" disabled>3️⃣ 导出 JS 数据</button>
        <span id="model-status">⏳ 等待初始化...</span>
    </div>

    <div class="image-container">
        <h2>📸 参考图片（点击查看大图）</h2>
        <div class="image-row" id="image-row"></div>
    </div>

    <div id="preview-section" class="preview-area" style="display:none;">
        <h2>🔍 检测结果预览</h2>
        <div id="image-name" style="margin-bottom:10px;color:#00a8ff;font-size:16px;"></div>
        <canvas id="preview-canvas"></canvas>
        <div id="detection-info" style="margin-top:15px;color:#aaa;font-size:14px;"></div>
        <div class="controls" style="margin-top:15px;text-align:left;">
            <button onclick="prevImage()">⬅️ 上一张</button>
            <button onclick="nextImage()">➡️ 下一张</button>
            <button onclick="redetectCurrent()" class="success">🔄 重新检测此图</button>
        </div>
    </div>

    <div class="status-log" id="status-log"></div>

    <div class="export-area" id="export-section" style="display:none;">
        <h2>💾 导出 skeleton-templates.js</h2>
        <p style="color:#aaa;font-size:13px;">将下方内容复制粘贴到 <code>js/skeleton-templates.js</code> 替换原文件</p>
        <textarea id="export-text" readonly></textarea>
    </div>

    <!-- MediaPipe Tasks Vision -->
    <script src="js/mediapipe/vision_bundle.mjs" type="module"></script>
    <script type="module">
        import { PoseLandmarker, HandLandmarker, FaceLandmarker, FilesetResolver } from './js/mediapipe/vision_bundle.mjs';
        window._mp = { PoseLandmarker, HandLandmarker, FaceLandmarker, FilesetResolver };
        window._mediapipeReady = true;
        log('MediaPipe 库加载完成', 'success');
        document.getElementById('btn-init').disabled = false;
    </script>

    <script>
        // ============ 全局状态 ============
        const IMAGES = [
            { id: 'classic_1_empresses',      name: '甄嬛传(单人)',   people: 1, src: 'assets/images/poses/classic_photos/classic_1_empresses.png' },
            { id: 'classic_2_wujing_xienan',  name: '吴京谢楠(双人)', people: 2, src: 'assets/images/poses/classic_photos/classic_2_wujing_xienan.png' },
            { id: 'classic_3_look_back',      name: '回头的诱惑(三人)', people: 3, src: 'assets/images/poses/classic_photos/classic_3_look_back.png' },
            { id: 'classic_3_exo',            name: 'EXO(三人)',      people: 3, src: 'assets/images/poses/classic_photos/classic_3_exo.png' },
            { id: 'classic_4_trump',          name: '特朗普(四人)',   people: 4, src: 'assets/images/poses/classic_photos/classic_4_trump.png' },
            { id: 'classic_4_empresses',      name: '甄嬛传(四人)',   people: 4, src: 'assets/images/poses/classic_photos/classic_4_empresses.png' },
            { id: 'classic_7_pro_team',       name: '专业团队(七人)', people: 7, src: 'assets/images/poses/classic_photos/classic_7_pro_team.png' },
        ];

        let poseLandmarker = null;
        let handLandmarker = null;
        let faceLandmarker = null;
        let loadedImages = {}; // id -> HTMLImageElement
        let detectionResults = {}; // id -> { persons: [{pose, hands, face}] }
        let currentIndex = 0;

        // ============ 日志 ============
        function log(msg, level='info') {
            const el = document.getElementById('status-log');
            const line = document.createElement('div');
            line.className = 'log-line log-' + level;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${msg}`;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }

        // ============ 模型初始化 ============
        async function initModels() {
            const btn = document.getElementById('btn-init');
            btn.disabled = true;
            document.getElementById('model-status').textContent = '⏳ 初始化模型中...';
            log('开始初始化 FilesetResolver...', 'info');

            try {
                const vision = await window._mp.FilesetResolver.forVisionTasks('js/mediapipe/wasm');
                log('FilesetResolver 就绪', 'success');

                // 姿势模型
                log('加载 PoseLandmarker (pose_landmarker_full.task)...', 'info');
                poseLandmarker = await window._mp.PoseLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: 'models/pose_landmarker_full.task', delegate: 'GPU' },
                    runningMode: 'IMAGE',
                    numPoses: 10,
                    minPoseDetectionConfidence: 0.3,
                    minPosePresenceConfidence: 0.3,
                    minTrackingConfidence: 0.3
                });
                log('✅ PoseLandmarker 就绪', 'success');

                // 手部模型
                log('加载 HandLandmarker...', 'info');
                handLandmarker = await window._mp.HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: 'models/hand_landmarker.task', delegate: 'GPU' },
                    runningMode: 'IMAGE',
                    numHands: 10,
                    minHandDetectionConfidence: 0.3,
                    minHandPresenceConfidence: 0.3,
                    minTrackingConfidence: 0.3
                });
                log('✅ HandLandmarker 就绪', 'success');

                // 面部模型
                log('加载 FaceLandmarker...', 'info');
                faceLandmarker = await window._mp.FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: 'models/face_landmarker.task', delegate: 'GPU' },
                    runningMode: 'IMAGE',
                    numFaces: 10,
                    minFaceDetectionConfidence: 0.3,
                    minFacePresenceConfidence: 0.3,
                    minTrackingConfidence: 0.3,
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false
                });
                log('✅ FaceLandmarker 就绪', 'success');

                document.getElementById('model-status').textContent = '✅ 所有模型就绪';
                document.getElementById('model-status').style.color = '#4caf50';
                document.getElementById('btn-detect').disabled = false;

                // 加载图片
                log('开始加载 7 张参考图片...', 'info');
                await loadAllImages();
                renderImageRow();

            } catch (err) {
                log('❌ 模型初始化失败: ' + err.message, 'error');
                console.error(err);
                document.getElementById('model-status').textContent = '❌ 初始化失败: ' + err.message;
                btn.disabled = false;
            }
        }

        // ============ 加载所有图片 ============
        async function loadAllImages() {
            const row = document.getElementById('image-row');
            row.innerHTML = '';

            for (let i = 0; i < IMAGES.length; i++) {
                const img = IMAGES[i];
                try {
                    const imageEl = await loadImage(img.src);
                    loadedImages[img.id] = imageEl;
                    log(`📷 ${img.name} 加载成功 (${imageEl.width}×${imageEl.height})`, 'info');
                } catch (err) {
                    log(`⚠️ ${img.name} 加载失败: ${err.message}`, 'warn');
                }
            }
            log(`共加载 ${Object.keys(loadedImages).length} 张图片`, 'success');
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('无法加载: ' + src));
                img.src = src;
            });
        }

        function renderImageRow() {
            const row = document.getElementById('image-row');
            row.innerHTML = '';
            IMAGES.forEach((img, idx) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                if (detectionResults[img.id]) card.classList.add('done');
                if (idx === currentIndex) card.classList.add('active');
                card.onclick = () => { currentIndex = idx; showPreview(); };

                // 绘制缩略图
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                if (loadedImages[img.id]) {
                    const imgEl = loadedImages[img.id];
                    const ratio = Math.min(200/imgEl.width, 200/imgEl.height);
                    const w = imgEl.width * ratio, h = imgEl.height * ratio;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, 200, 200);
                    ctx.drawImage(imgEl, (200-w)/2, (200-h)/2, w, h);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.fillText('加载失败', 70, 100);
                }
                card.appendChild(canvas);

                const label = document.createElement('div');
                label.className = 'label';
                label.textContent = img.name + (detectionResults[img.id] ? ' ✅' : '');
                card.appendChild(label);

                row.appendChild(card);
            });
        }

        // ============ 检测单张图片 ============
        async function detectImage(imageEl, imageData) {
            log(`🔍 检测 ${imageData.name}...`, 'info');

            const results = { persons: [] };

            // 1) 姿势检测
            const poseResult = poseLandmarker.detect(imageEl);
            const poses = poseResult.landmarks || [];
            log(`   检测到 ${poses.length} 个姿势`, 'info');

            // 2) 手部检测（独立运行）
            const handResult = handLandmarker.detect(imageEl);
            const hands = handResult.landmarks || [];
            const handedness = handResult.handednesses || [];
            log(`   检测到 ${hands.length} 只手`, 'info');

            // 3) 面部检测（独立运行）
            const faceResult = faceLandmarker.detect(imageEl);
            const faces = faceResult.faceLandmarks || [];
            log(`   检测到 ${faces.length} 张脸`, 'info');

            // 4) 按人分组：为每个人体匹配最近的手和脸
            const imgW = imageEl.width, imgH = imageEl.height;

            for (let i = 0; i < poses.length; i++) {
                const pose = poses[i];
                const person = { pose: [], hands: { left: null, right: null }, face: null };

                // 提取姿势关键点
                for (let j = 0; j < pose.length; j++) {
                    person.pose[j] = {
                        x: pose[j].x,
                        y: pose[j].y,
                        v: (typeof pose[j].visibility === 'number' ? pose[j].visibility : 1)
                    };
                }

                // 找到左右手腕位置 (MediaPipe Pose: 15=右腕, 16=左腕)
                // 注意：MediaPipe 中编号 15 是"right wrist"（从人物视角的右侧，即图像左侧）
                // 编号 16 是"left wrist"（从人物视角的左侧，即图像右侧）
                const rightWrist = pose[15]; // 图像左侧的手腕
                const leftWrist = pose[16];  // 图像右侧的手腕
                const nose = pose[0];

                // 匹配手部：根据手腕位置找最近的手
                const matchedHandIdx = new Set();
                if (leftWrist) {
                    let bestDist = Infinity, bestIdx = -1;
                    for (let h = 0; h < hands.length; h++) {
                        if (matchedHandIdx.has(h)) continue;
                        const hand = hands[h];
                        const wrist = hand[0]; // 手部关键点0=手腕
                        const dx = (wrist.x - leftWrist.x) * imgW;
                        const dy = (wrist.y - leftWrist.y) * imgH;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < bestDist && d < Math.max(imgW, imgH) * 0.15) {
                            bestDist = d;
                            bestIdx = h;
                        }
                    }
                    if (bestIdx >= 0) {
                        person.hands.right = hands[bestIdx].map(p => ({ x: p.x, y: p.y }));
                        matchedHandIdx.add(bestIdx);
                    }
                }
                if (rightWrist) {
                    let bestDist = Infinity, bestIdx = -1;
                    for (let h = 0; h < hands.length; h++) {
                        if (matchedHandIdx.has(h)) continue;
                        const hand = hands[h];
                        const wrist = hand[0];
                        const dx = (wrist.x - rightWrist.x) * imgW;
                        const dy = (wrist.y - rightWrist.y) * imgH;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < bestDist && d < Math.max(imgW, imgH) * 0.15) {
                            bestDist = d;
                            bestIdx = h;
                        }
                    }
                    if (bestIdx >= 0) {
                        person.hands.left = hands[bestIdx].map(p => ({ x: p.x, y: p.y }));
                        matchedHandIdx.add(bestIdx);
                    }
                }

                // 匹配面部：根据鼻子位置找最近的脸
                if (nose && faces.length > 0) {
                    let bestDist = Infinity, bestIdx = -1;
                    for (let f = 0; f < faces.length; f++) {
                        const face = faces[f];
                        const faceNose = face[1]; // 面部点1=鼻尖
                        const dx = (faceNose.x - nose.x) * imgW;
                        const dy = (faceNose.y - nose.y) * imgH;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < bestDist && d < Math.max(imgW, imgH) * 0.2) {
                            bestDist = d;
                            bestIdx = f;
                        }
                    }
                    if (bestIdx >= 0) {
                        person.face = faces[bestIdx].map(p => ({ x: p.x, y: p.y }));
                    }
                }

                results.persons.push(person);
            }

            log(`   ${imageData.name}: ${results.persons.length} 人 (${results.persons.filter(p=>p.hands.left||p.hands.right).length}只手, ${results.persons.filter(p=>p.face).length}张脸)`, 'success');
            return results;
        }

        // ============ 批量检测 ============
        async function detectAll() {
            document.getElementById('btn-detect').disabled = true;
            log('=============================', 'info');
            log('开始批量检测 7 张图片...', 'info');

            for (let i = 0; i < IMAGES.length; i++) {
                const img = IMAGES[i];
                if (!loadedImages[img.id]) {
                    log(`⏭️ 跳过 ${img.name} (未加载)`, 'warn');
                    continue;
                }
                try {
                    detectionResults[img.id] = await detectImage(loadedImages[img.id], img);
                    renderImageRow();
                } catch (err) {
                    log(`❌ ${img.name} 检测失败: ${err.message}`, 'error');
                    console.error(err);
                }
            }

            log('=============================', 'success');
            log('✅ 批量检测完成！', 'success');
            document.getElementById('btn-detect').disabled = false;
            document.getElementById('btn-export').disabled = false;
            if (IMAGES[0] && loadedImages[IMAGES[0].id]) {
                currentIndex = 0;
                showPreview();
            }
        }

        // ============ 单张重新检测 ============
        async function redetectCurrent() {
            const img = IMAGES[currentIndex];
            if (!img || !loadedImages[img.id]) return;
            log(`🔄 重新检测 ${img.name}...`, 'info');
            try {
                detectionResults[img.id] = await detectImage(loadedImages[img.id], img);
                renderImageRow();
                showPreview();
            } catch (err) {
                log(`❌ 检测失败: ${err.message}`, 'error');
            }
        }

        // ============ 预览检测结果 ============
        function showPreview() {
            const img = IMAGES[currentIndex];
            if (!img || !loadedImages[img.id]) return;

            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('image-name').textContent = img.name;

            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');
            const imgEl = loadedImages[img.id];

            canvas.width = imgEl.width;
            canvas.height = imgEl.height;
            ctx.drawImage(imgEl, 0, 0);

            const result = detectionResults[img.id];
            if (!result || !result.persons || result.persons.length === 0) {
                document.getElementById('detection-info').textContent = '⚠️ 未检测到人体';
                return;
            }

            // 绘制骨架
            const POSE_CONNECTIONS = [
                [11,12],[11,13],[13,15],[15,17],[15,19],[15,21],[17,19],
                [12,14],[14,16],[16,18],[16,20],[16,22],[18,20],
                [11,23],[12,24],[23,24],
                [23,25],[25,27],[27,29],[27,31],[29,31],
                [24,26],[26,28],[28,30],[28,32],[30,32],
                [0,11],[0,12]
            ];
            const HAND_CONNECTIONS = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[0,17],[17,18],[18,19],[19,20]
            ];
            const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,
                              397,365,379,378,400,377,152,148,176,149,150,136,
                              172,58,132,93,234,127,162,21,54,103,67,109,10];
            const LEFT_EYE = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
            const RIGHT_EYE = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];

            const W = canvas.width, H = canvas.height;
            const personColors = ['#00a8ff','#ff64ff','#64ffc8','#ffdc64','#ff9664','#ff6e6e','#4caf50'];

            let info = [];
            result.persons.forEach((person, idx) => {
                const color = personColors[idx % personColors.length];

                // 姿势骨架
                if (person.pose && person.pose.length > 11) {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = Math.max(2, W * 0.003);
                    POSE_CONNECTIONS.forEach(([a,b]) => {
                        if (person.pose[a] && person.pose[b]) {
                            const va = person.pose[a].v !== undefined ? person.pose[a].v : 1;
                            const vb = person.pose[b].v !== undefined ? person.pose[b].v : 1;
                            if (va < 0.3 || vb < 0.3) return;
                            ctx.beginPath();
                            ctx.moveTo(person.pose[a].x * W, person.pose[a].y * H);
                            ctx.lineTo(person.pose[b].x * W, person.pose[b].y * H);
                            ctx.stroke();
                        }
                    });
                    // 关节点
                    ctx.fillStyle = color;
                    for (let p = 0; p < person.pose.length; p++) {
                        if (!person.pose[p]) continue;
                        const v = person.pose[p].v !== undefined ? person.pose[p].v : 1;
                        if (v < 0.3) continue;
                        ctx.beginPath();
                        ctx.arc(person.pose[p].x * W, person.pose[p].y * H, Math.max(3, W*0.004), 0, Math.PI*2);
                        ctx.fill();
                    }
                }

                // 手部骨架
                ['left','right'].forEach(side => {
                    const hand = person.hands[side];
                    if (!hand || hand.length === 0) return;
                    const handColor = side === 'left' ? '#ff9f43' : '#ffa500';
                    ctx.strokeStyle = handColor;
                    ctx.lineWidth = Math.max(2, W * 0.003);
                    HAND_CONNECTIONS.forEach(([a,b]) => {
                        if (hand[a] && hand[b]) {
                            ctx.beginPath();
                            ctx.moveTo(hand[a].x * W, hand[a].y * H);
                            ctx.lineTo(hand[b].x * W, hand[b].y * H);
                            ctx.stroke();
                        }
                    });
                    ctx.fillStyle = handColor;
                    for (let p = 0; p < hand.length; p++) {
                        if (!hand[p]) continue;
                        ctx.beginPath();
                        ctx.arc(hand[p].x * W, hand[p].y * H, Math.max(3, W*0.004), 0, Math.PI*2);
                        ctx.fill();
                    }
                    // 手腕标注
                    if (hand[0]) {
                        ctx.fillStyle = 'white';
                        ctx.font = `${Math.max(10, W*0.012)}px sans-serif`;
                        ctx.fillText(side === 'left' ? 'L' : 'R', hand[0].x*W+5, hand[0].y*H-5);
                    }
                });

                // 面部网格
                if (person.face && person.face.length > 10) {
                    ctx.strokeStyle = 'rgba(46,204,113,0.8)';
                    ctx.lineWidth = Math.max(1.5, W*0.002);

                    // 脸型轮廓
                    ctx.beginPath();
                    for (let i = 0; i < FACE_OVAL.length; i++) {
                        const pt = person.face[FACE_OVAL[i]];
                        if (!pt) continue;
                        if (i === 0) ctx.moveTo(pt.x*W, pt.y*H);
                        else ctx.lineTo(pt.x*W, pt.y*H);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // 眼睛
                    ctx.strokeStyle = 'rgba(52,152,219,0.9)';
                    [LEFT_EYE, RIGHT_EYE].forEach(eye => {
                        ctx.beginPath();
                        for (let i = 0; i < eye.length; i++) {
                            const pt = person.face[eye[i]];
                            if (!pt) continue;
                            if (i === 0) ctx.moveTo(pt.x*W, pt.y*H);
                            else ctx.lineTo(pt.x*W, pt.y*H);
                        }
                        ctx.closePath();
                        ctx.stroke();
                    });

                    // 面部关键点
                    ctx.fillStyle = 'rgba(46,204,113,0.6)';
                    for (let p = 0; p < Math.min(person.face.length, 478); p++) {
                        if (!person.face[p]) continue;
                        ctx.beginPath();
                        ctx.arc(person.face[p].x*W, person.face[p].y*H, Math.max(1.5, W*0.002), 0, Math.PI*2);
                        ctx.fill();
                    }
                }

                // 编号
                if (person.pose && person.pose[11] && person.pose[12]) {
                    const cx = ((person.pose[11].x + person.pose[12].x) / 2) * W;
                    const cy = ((person.pose[11].y + person.pose[12].y) / 2) * H - 30;
                    ctx.fillStyle = color;
                    ctx.font = `bold ${Math.max(14, W*0.02)}px sans-serif`;
                    ctx.fillText(`#${idx+1}`, cx-15, cy);
                }

                // 统计信息
                const hasLeftHand = person.hands.left && person.hands.left.length > 0;
                const hasRightHand = person.hands.right && person.hands.right.length > 0;
                const hasFace = person.face && person.face.length > 0;
                info.push(`#${idx+1}[姿势:${person.pose.length}点 手:${hasLeftHand?'L':''}${hasRightHand?'R':''} 脸:${hasFace?'✅':'❌'}]`);
            });

            document.getElementById('detection-info').textContent = info.join('  |  ');
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + IMAGES.length) % IMAGES.length;
            renderImageRow();
            showPreview();
        }
        function nextImage() {
            currentIndex = (currentIndex + 1) % IMAGES.length;
            renderImageRow();
            showPreview();
        }

        // ============ 导出 JS 数据 ============
        function exportData() {
            const lines = [];
            lines.push('// ============================================================');
            lines.push('//  经典照片骨架模板 - 完整版本 (Pose 33 + Hands 21/手 + Face 478)');
            lines.push('//  生成时间: ' + new Date().toLocaleString());
            lines.push('// ============================================================');
            lines.push('');
            lines.push('window.SKELETON_TEMPLATES = {');
            lines.push('');

            for (let i = 0; i < IMAGES.length; i++) {
                const img = IMAGES[i];
                const result = detectionResults[img.id];
                lines.push(`    '${img.id}': {`);
                lines.push(`        people: ${img.people},`);
                lines.push(`        description: '${img.name}',`);
                lines.push(`        persons: [`);

                if (result && result.persons && result.persons.length > 0) {
                    result.persons.forEach((person, pIdx) => {
                        lines.push(`            { // 人物 ${pIdx + 1}`);

                        // 姿势关键点 (使用数字索引，兼容旧格式)
                        if (person.pose && person.pose.length > 0) {
                            for (let k = 0; k < person.pose.length; k++) {
                                if (!person.pose[k]) continue;
                                const pt = person.pose[k];
                                const v = pt.v !== undefined ? pt.v.toFixed(3) : '0.900';
                                lines.push(`                ${k}: { x: ${pt.x.toFixed(4)}, y: ${pt.y.toFixed(4)}, v: ${v} },`);
                            }
                        }

                        // 左手
                        if (person.hands.left && person.hands.left.length > 0) {
                            lines.push(`                handLeft: [`);
                            person.hands.left.forEach((pt, idx) => {
                                lines.push(`                    { x: ${pt.x.toFixed(4)}, y: ${pt.y.toFixed(4)} },${idx === 0 ? ' // 手腕' : ''}`);
                            });
                            lines.push(`                ],`);
                        } else {
                            lines.push(`                handLeft: null,`);
                        }

                        // 右手
                        if (person.hands.right && person.hands.right.length > 0) {
                            lines.push(`                handRight: [`);
                            person.hands.right.forEach((pt, idx) => {
                                lines.push(`                    { x: ${pt.x.toFixed(4)}, y: ${pt.y.toFixed(4)} },${idx === 0 ? ' // 手腕' : ''}`);
                            });
                            lines.push(`                ],`);
                        } else {
                            lines.push(`                handRight: null,`);
                        }

                        // 面部
                        if (person.face && person.face.length > 0) {
                            lines.push(`                face: [`);
                            // 只保留关键面部点: 脸型(37), 左眼(16), 右眼(16), 鼻子(9), 嘴唇(40) ≈ 118点
                            // 为了文件大小，精简为仅关键点
                            const keyFaceIndices = [
                                // 脸型轮廓
                                10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288,
                                397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136,
                                172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109,
                                // 左眼
                                33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246,
                                // 右眼
                                362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398,
                                // 鼻子
                                1, 168, 6, 197, 195, 5, 4, 19, 94,
                                // 嘴唇外
                                61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40, 185,
                                // 嘴唇内
                                78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95,
                                // 眉毛
                                70, 63, 105, 66, 107, 336, 296, 334, 293, 300
                            ];
                            keyFaceIndices.forEach((idx, ki) => {
                                const pt = person.face[idx];
                                if (pt) {
                                    lines.push(`                    { i: ${idx}, x: ${pt.x.toFixed(4)}, y: ${pt.y.toFixed(4)} },`);
                                }
                            });
                            lines.push(`                ],`);
                        } else {
                            lines.push(`                face: null,`);
                        }

                        lines.push(`            },`);
                    });
                } else {
                    lines.push(`            // ⚠️ 未检测到人体，需要手动标注`);
                }

                lines.push(`        ],`);
                lines.push(`    },`);
                lines.push('');
            }

            lines.push('};');
            lines.push('');

            const fullText = lines.join('\n');
            document.getElementById('export-text').value = fullText;
            document.getElementById('export-section').style.display = 'block';
            log(`📦 已生成 JS 数据 (${fullText.length.toLocaleString()}字符)`, 'success');
        }

        // ============ 初始化页面 ============
        log('页面加载完成，点击"初始化模型"开始', 'info');
    </script>
</body>
</html>
